name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            os_tag: windows-x64
            ext: ".exe"
          - os: ubuntu-22.04
            os_tag: linux-x64
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Установить зависимости
        run: |
          pip install -r requirements.txt -r requirements-build.txt -r requirements-gui.txt
          pip install -e . --no-deps

      - name: Собрать GUI (PyQt6)
        run: pyinstaller beam_gui.spec

      - name: Переименовать под ОС
        shell: bash
        run: mv "dist/beam_gui${{ matrix.ext }}" "beam-gui-${{ matrix.os_tag }}${{ matrix.ext }}"

      - name: Прикрепить к релизу
        uses: softprops/action-gh-release@v2
        with:
          files: beam-gui-${{ matrix.os_tag }}${{ matrix.ext }}