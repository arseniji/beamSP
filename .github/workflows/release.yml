name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Установить зависимости
        run: |
          pip install -r requirements.txt -r requirements-build.txt -r requirements-gui.txt
          pip install -e . --no-deps

      - name: Собрать GUI (PyQt6)
        run: pyinstaller beam_gui.spec

      - name: Переименовать
        shell: pwsh
        run: Rename-Item dist/beam_gui.exe beam-gui-windows-x64.exe

      - name: Прикрепить к релизу
        uses: softprops/action-gh-release@v2
        with:
          files: dist/beam-gui-windows-x64.exe